<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사각지대 없는 기적 재단 - 게임</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 게임 화면 컨테이너 */
        #game-container {
            margin-top: 20px;
            position: relative;
        }

        canvas {
            background-color: #111;
            display: block;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* 하단 조이스틱 컨테이너 */
        #controller-container {
            width: 360px; /* 캔버스 너비와 맞춤 */
            height: 120px;
            margin-top: 20px;
            background-color: #eaeaea;
            border-radius: 15px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
            touch-action: none; /* 브라우저 스크롤 방지 */
        }

        /* 움직이는 하트 조이스틱 */
        #heart-joystick {
            font-size: 50px;
            cursor: pointer;
            position: absolute;
            user-select: none;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 60px;
            height: 60px;
            transition: transform 0.05s linear; /* 부드러운 이동 */
        }
    </style>
</head>
<body>

    <!-- 1. 게임 화면 영역 -->
    <div id="game-container">
        <canvas id="gameCanvas" width="360" height="400"></canvas>
    </div>

    <!-- 2. 하트 컨트롤러 영역 -->
    <div id="controller-container">
        <div id="heart-joystick">❤️</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const heart = document.getElementById('heart-joystick');
    const container = document.getElementById('controller-container');

    // [게임 오브젝트 설정]
    // 이 player 구조를 갤러그의 삼각형이나 벽돌깨기의 패들에 그대로 대입하시면 됩니다.
    let player = {
        x: canvas.width / 2, // 게임 내 실제 X 좌표
        y: canvas.height - 40,
        width: 40,
        height: 30
    };

    // 총알 배열
    let bullets = [];

    // [드래그 및 연동 상태 변수]
    let isDragging = false;
    let startX = 0;
    let heartX = 0; // 하트의 현재 중심 기준 offset X 변수

    // 하트가 움직일 수 있는 최대 가동 범위 계산
    const maxMoveRange = (container.clientWidth / 2) - 30; 

    // [이벤트 리스너] 드래그 시작
    function startDrag(e) {
        isDragging = true;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        startX = clientX - heartX;
    }

    // [이벤트 리스너] 드래그 중 (★여기가 핵심 연동 로직입니다)
    function moveDrag(e) {
        if (!isDragging) return;
        
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        heartX = clientX - startX;

        // 하트가 조이스틱 영역 밖으로 나가지 않도록 고정
        if (heartX < -maxMoveRange) heartX = -maxMoveRange;
        if (heartX > maxMoveRange) heartX = maxMoveRange;

        // 1. 하트 그래픽 이동 반영
        heart.style.transform = `translateX(${heartX}px)`;

        // 2. 삼각형(패들) X 좌표 연동 계산
        // 하트의 위치 비율(-max ~ +max)을 0~1 사이의 비율(ratio)로 변환합니다.
        const ratio = (heartX + maxMoveRange) / (maxMoveRange * 2);
        
        // 변환된 비율을 게임 화면 전체 너비에 적용 (벽돌깨기 패들도 동일하게 적용 가능)
        player.x = ratio * (canvas.width - player.width);
    }

    // [이벤트 리스너] 드래그 끝
    function endDrag() {
        isDragging = false;
    }

    // 마우스 및 터치 이벤트 바인딩
    heart.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', moveDrag);
    window.addEventListener('mouseup', endDrag);

    heart.addEventListener('touchstart', startDrag, { passive: false });
    window.addEventListener('touchmove', moveDrag, { passive: false });
    window.addEventListener('touchend', endDrag);


    // --- 갤러그용 자동 총알 발사 시스템 (뿅뿅뿅 소리 메커니즘) ---
    setInterval(() => {
        // 드래그 중(하트를 잡고 조작 중)일 때만 총알이 자동으로 뿅뿅뿅 나갑니다.
        if (isDragging) {
            bullets.push({
                x: player.x + player.width / 2 - 2,
                y: player.y,
                speed: 7
            });
        }
    }, 200); // 0.2초 간격 발사


    // --- 메인 게임 루프 (렌더링) ---
    function updateAndRender() {
        // 화면 초기화
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 총알 업데이트 및 그리기
        ctx.fillStyle = '#ffff00'; // 노란색 총알
        for (let i = bullets.length - 1; i >= 0; i--) {
            bullets[i].y -= bullets[i].speed;
            ctx.fillRect(bullets[i].x, bullets[i].y, 4, 10);
            
            // 화면 밖으로 나간 총알 제거
            if (bullets[i].y < 0) {
                bullets.splice(i, 1);
            }
        }

        // 2. 플레이어(삼각형 총) 그리기
        // 하트 연동으로 변경된 player.x 좌표를 기준으로 삼각형을 그립니다.
        ctx.fillStyle = '#3498db'; // 푸른색 삼각형
        ctx.beginPath();
        ctx.moveTo(player.x + player.width / 2, player.y); // 꼭지점
        ctx.lineTo(player.x, player.y + player.height); // 좌하단
        ctx.lineTo(player.x + player.width, player.y + player.height); // 우하단
        ctx.closePath();
        ctx.fill();

        requestAnimationFrame(updateAndRender);
    }

    // 게임 시작
    updateAndRender();
</script>

</body>
</html>
