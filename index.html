<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사각지대 없는 기적 재단</title>
    <style>
        /* [1. 원래 있던 기본 스타일 복원] */
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 상단 헤더 영역 */
        .header-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            box-sizing: border-box;
        }
        .header-title {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
        }
        .header-badge {
            background-color: #8e44ad;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        /* 탭 버튼 영역 */
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tab-btn {
            border: none;
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        .btn-brick { background-color: #34495e; }
        .btn-galaga { background-color: #3498db; }
        .btn-match { background-color: #7f8c8d; }

        /* 게임 박스 외곽 */
        .game-box {
            background-color: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 게임 캔버스 */
        canvas {
            background-color: #111;
            display: block;
            border-radius: 10px;
        }

        /* 하단 시작/리셋 버튼 */
        .start-btn {
            width: 100%;
            background-color: #a29bfe;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 0;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .info-text {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 8px;
        }

        /* [2. 하트 컨트롤러 전용 스타일] */
        #controller-container {
            width: 100%;
            max-width: 360px;
            height: 100px;
            margin-top: 15px;
            background-color: #e9e9e9;
            border-radius: 15px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none; /* 화면 스크롤 방지 */
        }
        #heart-joystick {
            font-size: 45px;
            cursor: pointer;
            position: absolute;
            user-select: none;
            touch-action: none;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <!-- 원래 있던 상단 타이틀과 메뉴 복원 -->
    <div class="header-container">
        <div class="header-title">사각지대 없는 기적 재단</div>
        <div class="header-badge">🐳 기적의 고래 대장</div>
    </div>

    <!-- 원래 있던 게임 선택 탭 복원 -->
    <div class="tab-container">
        <button class="tab-btn btn-brick">🧱 벽돌깨기</button>
        <button class="tab-btn btn-galaga">🚀 갤러그</button>
        <button class="tab-btn btn-match">🃏 짝맞추기</button>
    </div>

    <!-- 게임 화면 박스 -->
    <div class="game-box">
        <canvas id="gameCanvas" width="340" height="340"></canvas>
        
        <button class="start-btn">🚀 갤러그 시작 / 리셋</button>
        <div class="info-text">조작: 하트 조이스틱을 좌우로 드래그 (격추당 +50원)</div>
    </div>

    <!-- 연동될 하트 컨트롤러 영역 추가 -->
    <div id="controller-container">
        <div id="heart-joystick">❤️</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const heart = document.getElementById('heart-joystick');
    const container = document.getElementById('controller-container');

    // 게임 캐릭터(삼각형) 상태
    let player = {
        x: canvas.width / 2 - 15,
        y: canvas.height - 35,
        width: 30,
        height: 22
    };

    let bullets = [];
    let isDragging = false;
    let startX = 0;
    let heartX = 0;

    // 하트 가동 범위 (컨테이너 크기 기준 자동 계산)
    const maxMoveRange = (container.clientWidth / 2) - 25; 

    // 드래그 시작
    function startDrag(e) {
        isDragging = true;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        startX = clientX - heartX;
    }

    // 드래그 중 (★하트 움직임과 총 이동 연동)
    function moveDrag(e) {
        if (!isDragging) return;
        
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        heartX = clientX - startX;

        if (heartX < -maxMoveRange) heartX = -maxMoveRange;
        if (heartX > maxMoveRange) heartX = maxMoveRange;

        // 하트 위치 이동
        heart.style.transform = `translateX(${heartX}px)`;

        // 게임 속 비행기(삼각형) X 좌표 동기화
        const ratio = (heartX + maxMoveRange) / (maxMoveRange * 2);
        player.x = ratio * (canvas.width - player.width);
    }

    // 드래그 종료
    function endDrag() {
        isDragging = false;
    }

    // 이벤트 리스너 등록 (터치/마우스 모두 지원)
    heart.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', moveDrag);
    window.addEventListener('mouseup', endDrag);

    heart.addEventListener('touchstart', startDrag, { passive: false });
    window.addEventListener('touchmove', moveDrag, { passive: false });
    window.addEventListener('touchend', endDrag);

    // [갤러그 총알 발사] 하트를 조작하고 있을 때 자동으로 뿅뿅뿅 나감
    setInterval(() => {
        if (isDragging) {
            bullets.push({
                x: player.x + player.width / 2 - 2,
                y: player.y,
                speed: 6
            });
        }
    }, 250); // 발사 간격 (0.25초)

    // 메인 게임 루프 실행
    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 총알 그리기
        ctx.fillStyle = '#ffff00';
        for (let i = bullets.length - 1; i >= 0; i--) {
            bullets[i].y -= bullets[i].speed;
            ctx.fillRect(bullets[i].x, bullets[i].y, 4, 10);
            if (bullets[i].y < 0) bullets.splice(i, 1);
        }

        // 2. 비행기(삼각형) 그리기
        ctx.fillStyle = '#3498db';
        ctx.beginPath();
        ctx.moveTo(player.x + player.width / 2, player.y);
        ctx.lineTo(player.x, player.y + player.height);
        ctx.lineTo(player.x + player.width, player.y + player.height);
        ctx.closePath();
        ctx.fill();

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>

</body>
</html>
